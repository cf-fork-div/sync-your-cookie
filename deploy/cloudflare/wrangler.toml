name = "sync-your-cookie-web"
main = "src/worker.ts"
compatibility_date = "2024-09-23"

[assets]
directory = "../../dist/web"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# Runtime env (override in Cloudflare Dashboard without rebuild)
# [vars]
# WEB_BASE_PATH — optional custom URL path segment (omit to serve at /)

# WEB_ACCESS_PASSWORD — set as encrypted secret via Dashboard or `wrangler secret put`

# KV binding for datasource config + sync (id filled by deploy.mjs)
[[kv_namespaces]]
binding = "SYNC_KV"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"
