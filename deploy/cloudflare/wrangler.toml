name = "sync-your-cookie-web"
compatibility_date = "2024-09-23"
pages_build_output_dir = "../../dist/web"

# Runtime env (override in Cloudflare Dashboard without rebuild)
[vars]
WEB_BASE_PATH = "my-cookie-vault"

# WEB_ACCESS_PASSWORD — set as encrypted secret via Dashboard or `wrangler pages secret put`

# KV namespace for extension sync (created by deploy script; id stored in .deploy-state.json)
[[kv_namespaces]]
binding = "COOKIES"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"
