name = "sync-your-cookie"
main = "src/worker.ts"
compatibility_date = "2024-09-23"

# Preserve Dashboard runtime vars/secrets not listed below across `wrangler deploy`.
# Without this, Git CI redeploy clears Variables set only in the Dashboard.
keep_vars = true

[assets]
directory = "../../dist/web"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# Runtime env (override in Cloudflare Dashboard without rebuild)
# [vars]
# WEB_BASE_PATH — optional custom URL path segment (omit to serve at /)

# WEB_ACCESS_PASSWORD — set as encrypted secret via Dashboard or `wrangler secret put`

# SYNC_KV binding is written by prepare-wrangler.mjs or deploy.mjs before deploy
